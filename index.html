<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
   <header>
    <div class="logo-title">
        <img src="./images/image 4.png" alt="Kross Store logo" class="image-logo">
        <div class="name-desc">
            <h1>KROSS STORE</h1>
            <p>Магазин лучших кроссовок</p>
        </div>
    </div>

    <nav class="nav-links">

        <a href="#" id="nav-cart">
            <img src="./images/Group.svg" alt="Shopping cart">
            <span id="cart-price">0</span>
        </a>

        <a href="#">
            <img src="./images/zmdi_favorite-outline.svg" alt="Favorites">
            Закладки
        </a>

        <a href="#">
            <img src="./images/Union.svg" alt="User profile">
            Профиль
        </a>
    </nav>
   </header>

   <main class="title-search">
    <div class="title">
    <h1>Все кроссовки</h1>
    <div class="search-filter">
        <div class="search-box">
            <img src="./images/zoom-svgrepo-com.svg" class="zoom-icon" alt="">
            <input type="text" placeholder="Поиск..." id="search-input">
        </div>
    </div>
</div>

<div class="card-wrapper"></div>

    <div id="loading-message" class="loading-message">Загрузка...</div>
    <div id="error-message" class="error-message">Что-то пошло не так</div>

   </main>

   <div id="cart-overlay" class="cart-overlay"></div>

   <div id="cart-sidebar" class="cart-sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Корзина</h2>
                <button id="close-sidebar" class="close-btn">✕</button>
            </div>
            <div id="cart-items-list" class="cart-items-list">
                <div id="empty-cart" class="empty-cart">
                    <img src="./images/cardboard.png" class="empty-cart-image">
                    <h3>Корзина пустая</h3>
                    <p>Добавьте хотя бы одну пару кроссовок, чтобы сделать заказ.</p>
                    <button id="back-btn" class="back-btn">← Вернуться назад</button>
                </div>
            </div>
            
            <div id="sidebar-footer" class="sidebar-footer">
                <div id="sidebar-footer-total" class="footer-row">
                    <span>Итого:</span>
                    <span class="dots"></span>
                    <span id="sidebar-total">0</span> ₽
                </div>
                <div id="sidebar-footer-tax" class="footer-row">
                    <span>Налог 5%:</span>
                    <span class="dots"></span>
                    <span id="sidebar-tax">0</span> ₽
                </div>
                <button class="checkout-btn">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
