<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
   <header>
    <div class="logo-title">
        <img src="./images/image 4.png" alt="Kross Store logo" class="image-logo">
        <div class="name-desc">
            <h1>KROSS STORE</h1>
            <p>Магазин лучших кроссовок</p>
        </div>
    </div>

    <nav class="nav-links">

        <a href="#">
            <img src="./images/Group.svg" alt="Shopping cart">
            1205 <span>₽</span>
        </a>

        <a href="#">
            <img src="./images/zmdi_favorite-outline.svg" alt="Favorites">
            Закладки
        </a>

        <a href="#">
            <img src="./images/Union.svg" alt="User profile">
            Профиль
        </a>
    </nav>
   </header>

   <main class="title-search">
    <div class="title">
    <h1>Все кроссовки</h1>
    <div class="search-filter">
        <div class="search-box">
            <img src="./images/zoom-svgrepo-com.svg" class="zoom-icon" alt="">
            <input type="text" placeholder="Поиск..." id="search-input">
        </div>
    </div>
</div>

<div class="card-wrapper"></div>

    <div id="loading-message" class="loading-message">Загрузка...</div>
    <div id="error-message" class="error-message">Что-то пошло не так</div>

  </div>

   </main>
    <script src="script.js"></script>
</body>
</html>
